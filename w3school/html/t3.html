<!-- Modify the HTML page to apply the correct colors using inline style

Requirements

The 'blue-color-element' text color should be blue.

The 'green-color-element' text color should be green.

The 'red-color-element' text color should be red.

 -->

<!doctype html>
<html>
    <style>
        #blue-color-element{
            color: blue;
        }
        
        #green-color-element{
            color: green;
        }
        
        #red-color-element{
            color: red;
        }
    </style>
<body>
  <h1>Color Challenge</h1>
  <div id="blue-color-element">Blue Color</div>
  <div id="green-color-element">Green Color</div>
  <div id="red-color-element">Red Color</div>
</body>

</html>
